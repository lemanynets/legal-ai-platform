name: Frontend E2E Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/e2e/**"
      - "frontend/playwright.config.ts"
      - ".github/workflows/frontend_e2e_smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Lockfile precheck
        run: npm run precheck:lockfile

      - name: Install deps
        run: npm ci

      - name: Install Playwright browser
        run: npm run e2e:install

      - name: Run e2e smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_API_BASE_URL: ${{ secrets.PLAYWRIGHT_API_BASE_URL }}
          E2E_AUTH_TOKEN: ${{ secrets.E2E_AUTH_TOKEN }}
          E2E_USER_ID: ${{ secrets.E2E_USER_ID }}
        run: npm run e2e:smoke
